<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBRE Tenant-Rep CRM</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #1a2233;
    --muted: #6b7280;
    --line: #e5e7eb;
    --brand: #1f4e79;
    --brand-dark: #163a5c;
    --accent: #2563eb;
    --danger: #b91c1c;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
  }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; }

  /* ---------- Login ---------- */
  #login-view {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 32px;
    width: 100%;
    max-width: 380px;
  }
  .login-card h1 { margin: 0 0 4px; font-size: 22px; color: var(--brand); }
  .login-card p.sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #374151; }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: #fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: 2px solid var(--accent); outline-offset: 0; border-color: var(--accent);
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px; border: 1px solid transparent; border-radius: 9px;
    background: var(--brand); color: #fff; font-weight: 600;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn.block { width: 100%; }
  .btn.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
  .btn.secondary:hover { background: #f3f4f6; }
  .btn.danger { background: #fff; color: var(--danger); border-color: #fca5a5; }
  .btn.danger:hover { background: #fef2f2; }
  .msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .msg.error { color: var(--danger); }
  .msg.ok { color: #15803d; }

  /* ---------- App ---------- */
  #app-view { display: none; }
  header.topbar {
    background: var(--brand); color: #fff;
    padding: 12px 20px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 5;
  }
  header.topbar h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: .2px; }
  header.topbar .spacer { flex: 1; }
  header.topbar .who { font-size: 13px; opacity: .85; }
  header.topbar .btn.secondary { background: rgba(255,255,255,.14); color: #fff; border-color: rgba(255,255,255,.25); }
  header.topbar .btn.secondary:hover { background: rgba(255,255,255,.24); }

  .wrap { max-width: 1040px; margin: 0 auto; padding: 20px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
  .toolbar .grow { flex: 1; }
  .toolbar select { padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fff; }
  .count { color: var(--muted); font-size: 13px; }

  /* ---------- Quick capture ---------- */
  .capture {
    background: linear-gradient(180deg, #fbfdff, #f3f7fc);
    border: 1px solid #dbe6f3; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 18px; box-shadow: var(--shadow);
  }
  .capture-head { font-weight: 700; font-size: 14px; color: var(--brand); margin-bottom: 8px; }
  .capture textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px;
    background: #fff; resize: vertical;
  }
  .capture textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .capture-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .capture-msg { color: var(--muted); font-size: 13px; }
  #mic-btn.rec { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }

  /* ---------- Pop-back-in match ---------- */
  .cand {
    display: block; width: 100%; text-align: left; background: #fff;
    border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer;
  }
  .cand:hover { background: #f3f7fc; border-color: var(--accent); }
  .cand-t { display: block; font-weight: 700; }
  .cand-s { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cand-go { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent); font-weight: 600; }

  .stage-group { margin-bottom: 26px; }
  .stage-head {
    display: flex; align-items: center; gap: 10px; margin: 0 0 10px;
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
  }
  .stage-head .pill { background: #eef2ff; color: var(--brand); padding: 2px 9px; border-radius: 999px; font-size: 12px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .lead {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .lead .tenant { font-weight: 700; font-size: 15px; }
  .lead .addr { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .lead .meta { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 13px; }
  .lead .meta .k { color: var(--muted); }
  .lead .row-actions { margin-top: 12px; display: flex; gap: 8px; }
  .lead .row-actions .btn { padding: 6px 12px; font-size: 13px; }
  .badge-code { display: inline-block; background: #111827; color: #fff; border-radius: 6px; padding: 1px 7px; font-size: 12px; font-variant-numeric: tabular-nums; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

  /* ---------- Dialog ---------- */
  dialog {
    border: none; border-radius: 14px; padding: 0; width: 100%; max-width: 560px;
    box-shadow: 0 20px 40px rgba(16,24,40,.24);
  }
  dialog::backdrop { background: rgba(16,24,40,.45); }
  .dlg-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; }
  .dlg-head h2 { margin: 0; font-size: 18px; }
  .dlg-body { padding: 20px 22px; max-height: 65vh; overflow: auto; }
  .dlg-foot { padding: 16px 22px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }
  fieldset { border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin: 0 0 16px; }
  fieldset legend { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 0 6px; }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-view">
  <form class="login-card" id="login-form">
    <h1>MBRE Tenant-Rep CRM</h1>
    <p class="sub">Sign in to your leads.</p>
    <div class="field">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn block" type="submit" id="login-btn">Sign in</button>
    <div class="msg" id="login-msg"></div>
  </form>
</div>

<!-- ===================== APP ===================== -->
<div id="app-view">
  <header class="topbar">
    <h1>MBRE Tenant-Rep CRM</h1>
    <div class="spacer"></div>
    <span class="who" id="who"></span>
    <button class="btn secondary" id="signout-btn">Sign out</button>
  </header>

  <div class="wrap">
    <div class="capture">
      <div class="capture-head">⚡ Quick capture</div>
      <textarea id="capture-text" rows="3" placeholder="Paste or dictate a note, e.g. &quot;230 W 36th, 14th floor, Acme Corp, about 8,000 sf, met John 212-555-1212, lease up next March&quot;"></textarea>
      <div class="capture-actions">
        <button class="btn secondary" id="mic-btn" type="button">🎤 Dictate</button>
        <button class="btn" id="parse-btn" type="button">Parse &amp; review →</button>
        <span class="capture-msg" id="capture-msg"></span>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn" id="add-btn">+ Add lead</button>
      <div class="grow"></div>
      <label class="count" for="stage-filter">Show:</label>
      <select id="stage-filter"><option value="">All stages</option></select>
      <span class="count" id="lead-count"></span>
    </div>

    <div id="leads-container"></div>
  </div>
</div>

<!-- ===================== LEAD DIALOG ===================== -->
<dialog id="lead-dialog">
  <form id="lead-form" method="dialog">
    <div class="dlg-head"><h2 id="dlg-title">Add lead</h2></div>
    <div class="dlg-body">
      <fieldset>
        <legend>Property</legend>
        <div class="grid2">
          <div class="field"><label>Address</label><input name="address" required></div>
          <div class="field"><label>Floor</label><input name="floor"></div>
          <div class="field"><label>Location code</label><input name="location_code" inputmode="numeric" placeholder="e.g. 362"></div>
          <div class="field"><label>Zone</label><input name="zone"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Tenant &amp; contact</legend>
        <div class="grid2">
          <div class="field"><label>Tenant name</label><input name="tenant_name"></div>
          <div class="field"><label>RSF</label><input name="rsf" inputmode="numeric"></div>
          <div class="field"><label>Contact name</label><input name="contact_name"></div>
          <div class="field"><label>Lease expiration</label><input name="lease_expiration" type="date"></div>
          <div class="field"><label>Email</label><input name="email" type="email"></div>
          <div class="field"><label>Phone</label><input name="phone"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Pipeline</legend>
        <div class="grid2">
          <div class="field"><label>Stage</label><select name="stage" id="stage-select"></select></div>
          <div class="field"><label>Owner</label>
            <select name="owner"><option value="">—</option><option>Michael</option><option>Assistant</option></select>
          </div>
          <div class="field"><label>Next follow-up</label><input name="next_followup" type="date"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Pop-in tracking</legend>
        <div class="grid2">
          <div class="field"><label>Last pop-in date</label><input name="last_popin_date" type="date"></div>
          <div class="field"><label>Pop-in count</label><input name="popin_count" inputmode="numeric"></div>
        </div>
        <div class="field"><label>Pop-in log</label><textarea name="popin_log" rows="3"></textarea></div>
      </fieldset>

      <div class="field"><label>Notes</label><textarea name="notes" rows="4"></textarea></div>
    </div>
    <div class="dlg-foot">
      <button type="button" class="btn danger" id="delete-btn" style="margin-right:auto; display:none;">Delete</button>
      <button type="button" class="btn secondary" id="cancel-btn">Cancel</button>
      <button type="submit" class="btn" id="save-btn">Save</button>
    </div>
  </form>
</dialog>

<!-- ===================== POP-BACK-IN MATCH DIALOG ===================== -->
<dialog id="match-dialog">
  <div class="dlg-head"><h2>Pop back in?</h2></div>
  <div class="dlg-body">
    <p id="match-text" style="margin-top:0;"></p>
    <div id="match-list"></div>
  </div>
  <div class="dlg-foot">
    <button type="button" class="btn secondary" id="match-cancel" style="margin-right:auto;">Cancel</button>
    <button type="button" class="btn" id="match-new">Create new lead instead</button>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= CONFIG (your Supabase project) ================= */
const SUPABASE_URL = 'https://tgcjnkscfgbmmtmxmbek.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_U2PnOyYd1Uc-5IC8Ox5xmQ_Nfqo8zD3';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* Pipeline stages, coldest -> closed, plus the parking stage. */
const STAGES = [
  '1 · Gatekeeper Drop-In',
  '2 · Decision Maker – Deferred',
  '3 · Lease Timing Known',
  '4 · Meeting / In Discussion',
  '5 · Non-Exclusive Showing',
  '6 · Exclusive Client',
  '7 · Survey & Touring',
  '8 · Deal / Closing',
  'Lost / Dormant'
];

/* Columns that must never be sent as empty string ('' breaks date/number columns). */
const NULL_IF_EMPTY = ['rsf','lease_expiration','next_followup','last_popin_date','popin_count'];
const NUMERIC = ['rsf','popin_count'];

/* ================= Elements ================= */
const $ = (id) => document.getElementById(id);
const loginView = $('login-view'), appView = $('app-view');
const dialog = $('lead-dialog'), form = $('lead-form');
let leads = [];
let editingId = null;

/* ================= Boot ================= */
init();
async function init() {
  // Fill the stage dropdowns.
  const stageSel = $('stage-select');
  STAGES.forEach(s => stageSel.add(new Option(s, s)));
  STAGES.forEach(s => $('stage-filter').add(new Option(s, s)));

  // Auto-fill the location code as the address is typed (unless the user typed their own).
  const addrEl = form.elements['address'];
  const codeEl = form.elements['location_code'];
  addrEl.addEventListener('input', () => {
    if (codeEl.dataset.touched === '1') return;
    const code = computeLocationCode(addrEl.value);
    if (code) codeEl.value = code;
  });
  codeEl.addEventListener('input', () => { codeEl.dataset.touched = '1'; });

  const { data: { session } } = await sb.auth.getSession();
  showView(session);
  sb.auth.onAuthStateChange((_e, sess) => showView(sess));
}

function showView(session) {
  if (session) {
    loginView.style.display = 'none';
    appView.style.display = 'block';
    $('who').textContent = session.user.email;
    loadLeads();
  } else {
    appView.style.display = 'none';
    loginView.style.display = 'grid';
  }
}

/* ================= Auth ================= */
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = $('login-msg'); msg.className = 'msg'; msg.textContent = 'Signing in…';
  $('login-btn').disabled = true;
  const { error } = await sb.auth.signInWithPassword({
    email: $('login-email').value.trim(),
    password: $('login-password').value
  });
  $('login-btn').disabled = false;
  if (error) { msg.className = 'msg error'; msg.textContent = error.message; }
  else { msg.textContent = ''; }
});

$('signout-btn').addEventListener('click', () => sb.auth.signOut());

/* ================= Load & render ================= */
async function loadLeads() {
  const container = $('leads-container');
  container.innerHTML = '<div class="empty">Loading…</div>';
  const { data, error } = await sb.from('leads')
    .select('*')
    .order('location_code', { ascending: true, nullsFirst: false });
  if (error) { container.innerHTML = '<div class="empty">Could not load leads: ' + esc(error.message) + '</div>'; return; }
  leads = data || [];
  render();
}

function render() {
  const container = $('leads-container');
  const filter = $('stage-filter').value;
  const shown = filter ? leads.filter(l => l.stage === filter) : leads;
  $('lead-count').textContent = shown.length + (shown.length === 1 ? ' lead' : ' leads');

  if (!shown.length) {
    container.innerHTML = '<div class="empty">No leads yet. Click <b>+ Add lead</b> to create your first one.</div>';
    return;
  }

  // Group by stage, in pipeline order.
  const order = filter ? [filter] : STAGES.concat(['(No stage)']);
  let html = '';
  order.forEach(stage => {
    const group = shown.filter(l => (l.stage || '(No stage)') === stage);
    if (!group.length) return;
    html += '<div class="stage-group"><div class="stage-head">' + esc(stage) +
            ' <span class="pill">' + group.length + '</span></div><div class="cards">';
    group.forEach(l => { html += leadCard(l); });
    html += '</div></div>';
  });
  container.innerHTML = html;

  container.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => openDialog(btn.getAttribute('data-edit'))));
}

function leadCard(l) {
  const line = [];
  if (l.contact_name) line.push(['Contact', l.contact_name]);
  if (l.phone) line.push(['Phone', l.phone]);
  if (l.rsf) line.push(['RSF', Number(l.rsf).toLocaleString()]);
  if (l.lease_expiration) line.push(['Lease exp.', l.lease_expiration]);
  if (l.next_followup) line.push(['Follow-up', l.next_followup]);
  if (l.owner) line.push(['Owner', l.owner]);
  const meta = line.map(([k,v]) => '<div class="k">' + esc(k) + '</div><div>' + esc(v) + '</div>').join('');
  const addr = [l.address, l.floor ? 'Fl ' + l.floor : ''].filter(Boolean).join(' · ');
  return '<div class="lead">' +
    (l.location_code ? '<span class="badge-code">' + esc(l.location_code) + '</span> ' : '') +
    '<span class="tenant">' + esc(l.tenant_name || '(unnamed tenant)') + '</span>' +
    '<div class="addr">' + esc(addr || '—') + '</div>' +
    (meta ? '<div class="meta">' + meta + '</div>' : '') +
    '<div class="row-actions"><button class="btn secondary" data-edit="' + l.id + '">Edit</button></div>' +
    '</div>';
}

$('stage-filter').addEventListener('change', render);

/* ================= Quick capture ================= */
$('parse-btn').addEventListener('click', async () => {
  const text = $('capture-text').value.trim();
  const msg = $('capture-msg');
  if (!text) { msg.textContent = 'Type or dictate a note first.'; return; }
  $('parse-btn').disabled = true;
  msg.textContent = 'Reading your note…';
  const { data, error } = await sb.functions.invoke('parse-lead', { body: { text } });
  $('parse-btn').disabled = false;
  if (error) { msg.textContent = 'Could not parse: ' + error.message; return; }
  if (data && data.error) { msg.textContent = 'Could not parse: ' + data.error; return; }
  msg.textContent = '';
  const matches = findMatches(data);
  if (matches.length) showMatchDialog(data, text, matches);
  else prefillAndOpen(data);
});

// Find existing leads at the same address (so we can offer "pop back in").
function normAddr(a) {
  if (!a) return '';
  return String(a).toLowerCase()
    .replace(/\./g, '')
    .replace(/,/g, ' ')
    .replace(/\bwest\b/g, 'w').replace(/\beast\b/g, 'e')
    .replace(/\bnorth\b/g, 'n').replace(/\bsouth\b/g, 's')
    .replace(/\bstreet\b/g, 'st').replace(/\bavenue\b/g, 'ave')
    .replace(/\bboulevard\b/g, 'blvd').replace(/\bplace\b/g, 'pl')
    .replace(/\b(\d+)(st|nd|rd|th)\b/g, '$1')   // 36th -> 36
    .replace(/\s+/g, ' ').trim();
}

function findMatches(fields) {
  const a = normAddr(fields.address);
  if (!a) return [];
  const all = leads.filter(l => normAddr(l.address) === a);
  const t = (fields.tenant_name || '').trim().toLowerCase();
  if (t) {
    const byTenant = all.filter(l => (l.tenant_name || '').trim().toLowerCase() === t);
    if (byTenant.length) return byTenant;   // same tenant at this address wins
  }
  return all;
}

let pendingCapture = null;   // remembers the parsed fields while the match dialog is open

function showMatchDialog(fields, note, matches) {
  pendingCapture = { fields, note };
  $('match-text').textContent = matches.length > 1
    ? `You already have ${matches.length} leads at this address. Pop back into one, or create a new lead:`
    : `You already have a lead at this address. Pop back in, or create a new lead:`;
  const list = $('match-list');
  list.innerHTML = '';
  matches.forEach(l => {
    const sub = [l.address, l.floor ? 'Fl ' + l.floor : ''].filter(Boolean).join(' · ');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cand';
    btn.innerHTML =
      '<span class="cand-t">' + esc(l.tenant_name || '(unnamed tenant)') + '</span>' +
      '<span class="cand-s">' + esc(sub) + ' — ' + esc(l.stage || '(no stage)') +
      ' · ' + (Number(l.popin_count) || 0) + ' pop-ins</span>' +
      '<span class="cand-go">Pop back in →</span>';
    btn.addEventListener('click', () => { $('match-dialog').close(); applyPopIn(l, fields, note); });
    list.appendChild(btn);
  });
  $('match-dialog').showModal();
}

$('match-new').addEventListener('click', () => {
  $('match-dialog').close();
  if (pendingCapture) prefillAndOpen(pendingCapture.fields);
});
$('match-cancel').addEventListener('click', () => $('match-dialog').close());

// Log a pop-in on an existing lead: append the note, bump the count, set today's date,
// and fill in any fields that were still blank. Never overwrites existing values.
async function applyPopIn(lead, fields, note) {
  const today = new Date().toISOString().slice(0, 10);
  const payload = {
    popin_count: (Number(lead.popin_count) || 0) + 1,
    last_popin_date: today,
    popin_log: (lead.popin_log ? lead.popin_log.trim() + '\n' : '') + today + ': ' + note,
  };
  const fillable = ['floor', 'tenant_name', 'rsf', 'contact_name', 'lease_expiration',
    'email', 'phone', 'next_followup', 'location_code', 'notes'];
  for (const k of fillable) {
    const cur = lead[k], val = fields[k];
    if ((cur === null || cur === undefined || cur === '') &&
        val !== null && val !== undefined && val !== '') {
      payload[k] = val;
    }
  }
  const msg = $('capture-msg');
  msg.textContent = 'Updating…';
  const { error } = await sb.from('leads').update(payload).eq('id', lead.id);
  if (error) { msg.textContent = 'Could not update: ' + error.message; return; }
  $('capture-text').value = '';
  msg.textContent = 'Updated ' + (lead.tenant_name || 'lead') + ' — pop-in #' + payload.popin_count + ' logged.';
  loadLeads();
}

// Open the lead form as a NEW lead, pre-filled with the AI's fields for review.
function prefillAndOpen(fields) {
  editingId = null;
  form.reset();
  $('dlg-title').textContent = 'Review captured lead';
  form.elements['stage'].value = STAGES[0];
  form.elements['location_code'].dataset.touched = '';
  for (const [k, v] of Object.entries(fields || {})) {
    const el = form.elements[k];
    if (el && v != null && v !== '') el.value = v;
  }
  const code = computeLocationCode(form.elements['address'].value);
  if (code && !form.elements['location_code'].value) form.elements['location_code'].value = code;
  $('delete-btn').style.display = 'none';
  dialog.showModal();
}

// Voice dictation using the browser's built-in speech recognition (Chrome).
(function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = $('mic-btn');
  if (!SR) { micBtn.style.display = 'none'; return; }  // e.g. Safari/Firefox: use phone keyboard mic instead
  const rec = new SR();
  rec.continuous = true; rec.interimResults = false; rec.lang = 'en-US';
  let listening = false;
  rec.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    const ta = $('capture-text');
    ta.value = (ta.value ? ta.value.trim() + ' ' : '') + t.trim();
  };
  rec.onend = () => { listening = false; micBtn.textContent = '🎤 Dictate'; micBtn.classList.remove('rec'); };
  rec.onerror = () => { listening = false; micBtn.textContent = '🎤 Dictate'; micBtn.classList.remove('rec'); };
  micBtn.addEventListener('click', () => {
    if (listening) { rec.stop(); return; }
    try { rec.start(); listening = true; micBtn.textContent = '⏹ Stop'; micBtn.classList.add('rec'); }
    catch (_) { /* ignore double-starts */ }
  });
})();

/* ================= Dialog / save / delete ================= */
$('add-btn').addEventListener('click', () => openDialog(null));
$('cancel-btn').addEventListener('click', () => dialog.close());

function openDialog(id) {
  editingId = id;
  form.reset();
  const del = $('delete-btn');
  if (id) {
    const l = leads.find(x => String(x.id) === String(id));
    $('dlg-title').textContent = 'Edit lead';
    for (const el of form.elements) {
      if (el.name && l[el.name] != null) el.value = l[el.name];
    }
    // An existing code counts as user-set, so typing the address won't overwrite it.
    form.elements['location_code'].dataset.touched = l.location_code ? '1' : '';
    del.style.display = 'inline-flex';
  } else {
    $('dlg-title').textContent = 'Add lead';
    form.elements['stage'].value = STAGES[0];
    form.elements['location_code'].dataset.touched = '';
    del.style.display = 'none';
  }
  dialog.showModal();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {};
  for (const el of form.elements) {
    if (!el.name) continue;
    let v = el.value;
    if (v === '' && NULL_IF_EMPTY.includes(el.name)) v = null;
    else if (v === '') v = null;
    else if (NUMERIC.includes(el.name)) v = Number(v);
    payload[el.name] = v;
  }
  $('save-btn').disabled = true;
  let error;
  if (editingId) ({ error } = await sb.from('leads').update(payload).eq('id', editingId));
  else ({ error } = await sb.from('leads').insert(payload));
  $('save-btn').disabled = false;
  if (error) { alert('Could not save: ' + error.message); return; }
  dialog.close();
  loadLeads();
});

$('delete-btn').addEventListener('click', async () => {
  if (!editingId) return;
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  const { error } = await sb.from('leads').delete().eq('id', editingId);
  if (error) { alert('Could not delete: ' + error.message); return; }
  dialog.close();
  loadLeads();
});

/* ================= Location code =================
   3-digit code: first two digits = the cross-street number,
   third digit = the avenue block (hundreds digit of the building number).
   Example: "230 W 36th St" -> cross street 36, building 230 (hundreds = 2) -> "362".
   Returns null when the address isn't a numbered side street (e.g. an avenue). */
function computeLocationCode(address) {
  if (!address) return null;
  const cross = extractCrossStreet(address);
  const buildMatch = String(address).match(/\d+/);   // first number = building number
  if (cross == null || !buildMatch) return null;
  const building = parseInt(buildMatch[0], 10);
  const blockDigit = Math.floor((building % 1000) / 100);  // hundreds digit, 0-9
  return String(cross).padStart(2, '0') + String(blockDigit);
}

function extractCrossStreet(address) {
  // Prefer an ordinal number followed by St/Street, e.g. "36th St", "42nd Street".
  let m = address.match(/(\d{1,3})\s*(?:st|nd|rd|th)\s+(?:st\b|street\b)/i);
  if (m) return parseInt(m[1], 10);
  // Otherwise a direction + ordinal, e.g. "W 36th", "East 42nd".
  m = address.match(/\b(?:w|e|west|east)\.?\s*(\d{1,3})\s*(?:st|nd|rd|th)\b/i);
  if (m) return parseInt(m[1], 10);
  return null;
}

/* ================= Utils ================= */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
