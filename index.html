<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBRE Tenant-Rep CRM</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #1a2233;
    --muted: #6b7280;
    --line: #e5e7eb;
    --brand: #1f4e79;
    --brand-dark: #163a5c;
    --accent: #2563eb;
    --danger: #b91c1c;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
  }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; }

  /* ---------- Login ---------- */
  #login-view {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 32px;
    width: 100%;
    max-width: 380px;
  }
  .login-card h1 { margin: 0 0 4px; font-size: 22px; color: var(--brand); }
  .login-card p.sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #374151; }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: #fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: 2px solid var(--accent); outline-offset: 0; border-color: var(--accent);
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px; border: 1px solid transparent; border-radius: 9px;
    background: var(--brand); color: #fff; font-weight: 600;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn.block { width: 100%; }
  .btn.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
  .btn.secondary:hover { background: #f3f4f6; }
  .btn.danger { background: #fff; color: var(--danger); border-color: #fca5a5; }
  .btn.danger:hover { background: #fef2f2; }
  .msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .msg.error { color: var(--danger); }
  .msg.ok { color: #15803d; }

  /* ---------- App ---------- */
  #app-view { display: none; }
  header.topbar {
    background: var(--brand); color: #fff;
    padding: 12px 20px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 5;
  }
  header.topbar h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: .2px; }
  header.topbar .spacer { flex: 1; }
  header.topbar .who { font-size: 13px; opacity: .85; }
  header.topbar .btn.secondary { background: rgba(255,255,255,.14); color: #fff; border-color: rgba(255,255,255,.25); }
  header.topbar .btn.secondary:hover { background: rgba(255,255,255,.24); }

  .wrap { max-width: 1040px; margin: 0 auto; padding: 20px; }
  .wrap.wide { max-width: none; }   /* full page width in Table view */
  .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
  .toolbar .grow { flex: 1; }
  .toolbar select { padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fff; }
  .count { color: var(--muted); font-size: 13px; }

  /* ---------- Quick capture ---------- */
  .capture {
    background: linear-gradient(180deg, #fbfdff, #f3f7fc);
    border: 1px solid #dbe6f3; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 18px; box-shadow: var(--shadow);
  }
  .capture-head { font-weight: 700; font-size: 14px; color: var(--brand); margin-bottom: 8px; }
  .capture textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px;
    background: #fff; resize: vertical;
  }
  .capture textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .capture-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .capture-msg { color: var(--muted); font-size: 13px; }
  #mic-btn.rec { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }

  /* ---------- Pop-back-in match ---------- */
  .cand {
    display: block; width: 100%; text-align: left; background: #fff;
    border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer;
  }
  .cand:hover { background: #f3f7fc; border-color: var(--accent); }
  .cand-t { display: block; font-weight: 700; }
  .cand-s { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cand-go { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent); font-weight: 600; }

  /* ---------- Stage select on card + activity log ---------- */
  .card-stage {
    padding: 5px 8px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 12px; background: #fff; max-width: 190px;
  }
  .activity-view {
    margin-top: 10px; max-height: 160px; overflow: auto;
    border: 1px solid var(--line); border-radius: 8px; background: #fafafa; padding: 8px 10px;
  }
  .ro-field { padding: 10px 12px; border: 1px solid var(--line); border-radius: 9px; background: #f7f8fa; color: #374151; }
  .act-line { font-size: 12px; color: #374151; padding: 3px 0; border-bottom: 1px solid #eee; }
  .act-line:last-child { border-bottom: none; }
  .muted-note { color: var(--muted); font-size: 12px; }

  /* ---------- Search + view toggle ---------- */
  .search {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 9px;
    background: #fff; min-width: 220px; flex: 0 1 320px;
  }
  .search:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .viewtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
  .vt { background: #fff; border: none; padding: 8px 14px; font-size: 13px; color: var(--muted); }
  .vt.active { background: var(--brand); color: #fff; }

  /* ---------- Spreadsheet (table) view ---------- */
  .table-wrap {
    overflow-x: auto; border: 1px solid var(--line); border-radius: 12px;
    background: #fff; box-shadow: var(--shadow);
  }
  table.grid { border-collapse: collapse; width: 100%; font-size: 13px; }
  table.grid th, table.grid td {
    padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap;
  }
  table.grid th {
    position: sticky; top: 0; background: #eef1f5; cursor: pointer; user-select: none;
    font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); z-index: 1;
  }
  table.grid th:hover { background: #e4e9f0; }
  table.grid tbody tr { cursor: pointer; }
  table.grid tbody tr:hover { background: #f3f7fc; }
  table.grid td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.grid td.notes-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  table.grid td.stage-cell { padding: 4px 6px; }
  table.grid td.stage-cell .card-stage { max-width: 175px; }
  table.grid td.empty { text-align: center; color: var(--muted); white-space: normal; }
  table.grid th.chk-col, table.grid td.chk-col { width: 34px; text-align: center; padding: 6px; }
  table.grid td.chk-col input, table.grid th.chk-col input { width: 16px; height: 16px; cursor: pointer; }

  /* ---------- Buildings view ---------- */
  .buildings-only { display: none; }
  .wrap.buildings .lead-only { display: none !important; }
  .wrap.buildings .buildings-only { display: inline-flex; }
  .wrap.buildings .capture { display: none; }
  .bldg-lead {
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
    margin-bottom: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  .bldg-lead:hover { background: #f3f7fc; }
  .bl-stage { margin-left: auto; font-size: 12px; color: var(--muted); }
  .lead[data-bldg] { cursor: pointer; position: relative; }
  .bldg-check { width: 16px; height: 16px; cursor: pointer; }

  /* ---------- Today (daily progress) view ---------- */
  .today-only { display: none; }
  .wrap.today .lead-only { display: none !important; }
  .wrap.today .buildings-only { display: none !important; }
  .wrap.today .today-only { display: inline-flex; }
  .wrap.today .capture { display: none; }
  .day-sheet { max-width: 1000px; }
  .day-sec { margin-bottom: 22px; }
  .day-sec h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 0 0 8px; }
  .day-item {
    border: 1px solid var(--line); border-radius: 10px; background: #fff;
    padding: 10px 12px; margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
  }
  .day-item:hover { background: #f3f7fc; }
  .di-top { font-weight: 600; }
  .di-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .di-log { font-size: 12px; color: #374151; margin-top: 4px; }
  .day-empty { color: var(--muted); font-size: 13px; }

  /* ---------- Map view ---------- */
  #map { height: 72vh; width: 100%; border: 1px solid var(--line); border-radius: 12px; }
  .map-note { color: var(--muted); font-size: 13px; margin: 0 0 10px; }
  .leaflet-popup-content { font-size: 13px; line-height: 1.4; }

  /* ---------- Printable visit list ---------- */
  #print-area { display: none; }
  #print-area h1 { font-size: 20px; margin: 0 0 2px; }
  #print-area .pmeta { font-size: 12px; color: #444; margin-bottom: 12px; }
  #print-area h2 { font-size: 14px; margin: 16px 0 6px; border-bottom: 1.5px solid #000; padding-bottom: 2px; }
  #print-area .pitem { margin: 0 0 9px; padding: 0 0 8px; border-bottom: 1px dashed #bbb; }
  #print-area .pline1 { font-size: 14px; }
  #print-area .pline { font-size: 12px; color: #222; margin-top: 2px; }
  #print-area .pbox { display: inline-block; width: 13px; height: 13px; border: 1.5px solid #000; vertical-align: middle; margin-right: 7px; }
  @media print {
    body > *:not(#print-area) { display: none !important; }
    #print-area { display: block !important; }
    #print-area .pitem { break-inside: avoid; }
    @page { margin: 0.6in; }
  }

  .stage-group { margin-bottom: 26px; }
  .stage-head {
    display: flex; align-items: center; gap: 10px; margin: 0 0 10px;
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
  }
  .stage-head .pill { background: #eef2ff; color: var(--brand); padding: 2px 9px; border-radius: 999px; font-size: 12px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .lead {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .lead .tenant { font-weight: 700; font-size: 15px; }
  .lead .addr { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .lead .meta { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 13px; }
  .lead .meta .k { color: var(--muted); }
  .lead .row-actions { margin-top: 12px; display: flex; gap: 8px; }
  .lead .row-actions .btn { padding: 6px 12px; font-size: 13px; }
  .badge-code { display: inline-block; background: #111827; color: #fff; border-radius: 6px; padding: 1px 7px; font-size: 12px; font-variant-numeric: tabular-nums; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

  /* ---------- Dialog ---------- */
  dialog {
    border: none; border-radius: 14px; padding: 0; width: 100%; max-width: 560px;
    box-shadow: 0 20px 40px rgba(16,24,40,.24);
  }
  dialog::backdrop { background: rgba(16,24,40,.45); }
  .dlg-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; }
  .dlg-head h2 { margin: 0; font-size: 18px; }
  .dlg-body { padding: 20px 22px; max-height: 65vh; overflow: auto; }
  .dlg-foot { padding: 16px 22px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }
  fieldset { border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin: 0 0 16px; }
  fieldset legend { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 0 6px; }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-view">
  <form class="login-card" id="login-form">
    <h1>MBRE Tenant-Rep CRM</h1>
    <p class="sub">Sign in to your leads.</p>
    <div class="field">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn block" type="submit" id="login-btn">Sign in</button>
    <div class="msg" id="login-msg"></div>
  </form>
</div>

<!-- ===================== APP ===================== -->
<div id="app-view">
  <header class="topbar">
    <h1>MBRE Tenant-Rep CRM</h1>
    <div class="spacer"></div>
    <span class="who" id="who"></span>
    <button class="btn secondary" id="signout-btn">Sign out</button>
  </header>

  <div class="wrap">
    <div class="capture">
      <div class="capture-head">⚡ Quick capture</div>
      <textarea id="capture-text" rows="3" placeholder="Paste or dictate a note, e.g. &quot;230 W 36th, 14th floor, Acme Corp, about 8,000 sf, met John 212-555-1212, lease up next March&quot;"></textarea>
      <div class="capture-actions">
        <button class="btn secondary" id="mic-btn" type="button">🎤 Dictate</button>
        <button class="btn" id="parse-btn" type="button">Parse &amp; review →</button>
        <span class="capture-msg" id="capture-msg"></span>
      </div>
    </div>

    <div class="toolbar">
      <span class="lead-only" style="display:contents">
        <button class="btn" id="add-btn">+ Add lead</button>
        <input id="search" class="search" type="search" placeholder="Search company, contact, address, notes…">
      </span>
      <button type="button" class="btn buildings-only" id="add-building-btn">+ Add building</button>
      <span class="today-only" style="align-items:center; gap:10px;">
        <label class="count" for="today-date">Day:</label>
        <input type="date" id="today-date">
        <button type="button" class="btn" id="print-day-btn">🖨 Print day</button>
      </span>
      <div class="grow"></div>
      <span class="lead-only" style="display:contents">
        <button type="button" class="btn" id="print-btn" title="Print the checked leads as a visit list">🖨 Print list (0)</button>
        <button type="button" class="btn danger" id="delete-selected-btn" title="Delete the checked leads">🗑 Delete (0)</button>
      </span>
      <span class="buildings-only" style="align-items:center; gap:10px;">
        <button type="button" class="btn secondary" id="bldg-checkall-btn">Check all shown</button>
        <button type="button" class="btn" id="print-canvass-btn" title="Print the checked buildings as a canvass list">🖨 Print canvass (0)</button>
      </span>
      <div class="viewtoggle">
        <button type="button" class="vt active" id="view-cards">Cards</button>
        <button type="button" class="vt" id="view-table">Table</button>
        <button type="button" class="vt" id="view-map">Map</button>
        <button type="button" class="vt" id="view-buildings">Buildings</button>
        <button type="button" class="vt" id="view-today">Today</button>
      </div>
      <span class="lead-only" style="display:contents">
        <label class="count" for="code-filter">Code:</label>
        <select id="code-filter"><option value="">All codes</option></select>
        <label class="count" for="stage-filter">Show:</label>
        <select id="stage-filter"><option value="">All stages</option></select>
        <span class="count" id="lead-count"></span>
      </span>
      <span class="buildings-only" style="align-items:center; gap:8px;">
        <label class="count" for="bldg-status-filter">Status:</label>
        <select id="bldg-status-filter">
          <option value="">All</option>
          <option>To Canvass</option>
          <option>Canvassed</option>
          <option>Revisit</option>
        </select>
        <span class="count" id="bldg-count"></span>
      </span>
    </div>

    <div id="leads-container"></div>
  </div>
</div>

<!-- ===================== LEAD DIALOG ===================== -->
<dialog id="lead-dialog">
  <form id="lead-form" method="dialog">
    <div class="dlg-head"><h2 id="dlg-title">Add lead</h2></div>
    <div class="dlg-body">
      <fieldset>
        <legend>Property</legend>
        <div class="grid2">
          <div class="field"><label>Address</label><input name="address" required></div>
          <div class="field"><label>Floor</label><input name="floor"></div>
          <div class="field"><label>Location code</label><input name="location_code" inputmode="numeric" placeholder="e.g. 362"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Tenant &amp; contact</legend>
        <div class="grid2">
          <div class="field"><label>Tenant name</label><input name="tenant_name"></div>
          <div class="field"><label>RSF</label><input name="rsf" inputmode="numeric"></div>
          <div class="field"><label>Contact name</label><input name="contact_name"></div>
          <div class="field"><label>Lease expiration</label><input name="lease_expiration" type="date"></div>
          <div class="field"><label>Email</label>
            <div style="display:flex; gap:8px;">
              <input name="email" type="email" style="flex:1;">
              <button type="button" class="btn secondary" id="email-btn" title="Compose an email to this contact">✉ Email</button>
            </div>
          </div>
          <div class="field"><label>Phone</label><input name="phone"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Pipeline</legend>
        <div class="grid2">
          <div class="field"><label>Stage</label><select name="stage" id="stage-select"></select></div>
          <div class="field"><label>Owner</label>
            <select name="owner"><option value="">—</option><option>Michael</option><option>Assistant</option></select>
          </div>
          <div class="field"><label>Next follow-up</label><input name="next_followup" type="date"></div>
        </div>
      </fieldset>

      <div class="field"><label>Notes</label><textarea name="notes" rows="4"></textarea></div>

      <fieldset>
        <legend>Pop-in tracking</legend>
        <div class="grid2">
          <div class="field"><label>Last pop-in</label><div id="popin-last" class="ro-field"></div></div>
          <div class="field"><label>Pop-in count</label><div id="popin-count-view" class="ro-field"></div></div>
        </div>
        <div class="field"><label>Log a pop-in (saved with today's date &amp; time; bumps the count)</label>
          <textarea id="popin-text" rows="2" placeholder="e.g. Stopped by — receptionist said decision maker is out, try again in 2 weeks"></textarea></div>
        <div id="popin-view" class="activity-view"></div>
      </fieldset>

      <fieldset>
        <legend>Activity log</legend>
        <div class="field"><label>Add an update (saved with today's date &amp; time)</label>
          <textarea id="update-text" rows="2" placeholder="e.g. Left voicemail; sending survey Monday"></textarea></div>
        <div id="activity-view" class="activity-view"></div>
      </fieldset>
    </div>
    <div class="dlg-foot">
      <button type="button" class="btn danger" id="delete-btn" style="margin-right:auto; display:none;">Delete</button>
      <button type="button" class="btn secondary" id="cancel-btn">Cancel</button>
      <button type="submit" class="btn" id="save-btn">Save</button>
    </div>
  </form>
</dialog>

<!-- ===================== POP-BACK-IN MATCH DIALOG ===================== -->
<dialog id="match-dialog">
  <div class="dlg-head"><h2>Pop back in?</h2></div>
  <div class="dlg-body">
    <p id="match-text" style="margin-top:0;"></p>
    <div id="match-list"></div>
  </div>
  <div class="dlg-foot">
    <button type="button" class="btn secondary" id="match-cancel" style="margin-right:auto;">Cancel</button>
    <button type="button" class="btn" id="match-new">Create new lead instead</button>
  </div>
</dialog>

<!-- ===================== BUILDING DIALOG ===================== -->
<dialog id="building-dialog">
  <form id="building-form" method="dialog">
    <div class="dlg-head"><h2 id="bldg-title">Building</h2></div>
    <div class="dlg-body">
      <fieldset>
        <legend>Building</legend>
        <div class="grid2">
          <div class="field"><label>Address</label><input name="address" required></div>
          <div class="field"><label>Location code</label><input name="location_code" inputmode="numeric"></div>
          <div class="field"><label>Floors</label><input name="floors" inputmode="numeric"></div>
          <div class="field"><label>Landlord</label><input name="landlord"></div>
          <div class="field"><label>Asking rent ($/RSF)</label><input name="asking_rent" inputmode="decimal" placeholder="e.g. 65.00"></div>
          <div class="field"><label>Canvass status</label>
            <select name="canvass_status"><option value="">—</option><option>To Canvass</option><option>Canvassed</option><option>Revisit</option></select>
          </div>
          <div class="field"><label>Last canvassed</label><input name="last_canvassed" type="date"></div>
        </div>
        <div class="field"><label>Access (a confirmed tenant + floor to name at the front desk)</label>
          <input name="access" placeholder="e.g. Here to see Acme Corp on the 14th floor"></div>
      </fieldset>
      <div class="field"><label>Notes</label><textarea name="notes" rows="3"></textarea></div>
      <fieldset>
        <legend>Tenants / leads in this building</legend>
        <div id="bldg-leads"></div>
      </fieldset>
    </div>
    <div class="dlg-foot">
      <button type="button" class="btn danger" id="bldg-delete-btn" style="margin-right:auto; display:none;">Delete building</button>
      <button type="button" class="btn secondary" id="bldg-cancel-btn">Cancel</button>
      <button type="submit" class="btn" id="bldg-save-btn">Save</button>
    </div>

/* ================= CONFIG (your Supabase project) ================= */
const SUPABASE_URL = 'https://tgcjnkscfgbmmtmxmbek.supabase.co';

/* Pipeline stages, coldest -> closed, plus the parking stage. */

/* ================= Elements ================= */

const loginView = $('login-view'), appView = $('app-view');
const dialog = $('lead-dialog'), form = $('lead-form');
let leads = [];
let editingId = null;

let searchText = '';
const selected = new Set();  // lead ids checked for the print/visit list

/* ================= Auth ================= */

/* ================= Load & render ================= */
async function loadLeads() {
  const container = $('leads-container');
  container.innerHTML = '<div class="empty">Loading…</div>';
  const { data, error } = await sb.from('leads')
    .select('*')
    .order('location_code', { ascending: true, nullsFirst: false });
  if (error) { container.innerHTML = '<div class="empty">Could not load leads: ' + esc(error.message) + '</div>'; return; }
  leads = data || [];

  // Load buildings too (ignore error if the table doesn't exist yet)
  const bres = await sb.from('buildings').select('*').order('location_code', { ascending: true, nullsFirst: false });
  buildings = bres.error ? [] : (bres.data || []);

  populateCodeFilter();
  render();
}

// Fill the Code dropdown with the distinct location codes currently in use.
function populateCodeFilter() {
  const sel = $('code-filter');
  const cur = sel.value;
  const codes = [...new Set(leads.map(l => l.location_code).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All codes</option>' +
    codes.map(c => '<option' + (c === cur ? ' selected' : '') + '>' + esc(c) + '</option>').join('');
}

// Does a lead match the current search text?
function leadMatches(l, q) {
  const hay = [l.tenant_name, l.contact_name, l.address, l.floor, l.rsf, l.phone,
    l.email, l.notes, l.stage, l.location_code, l.owner]
    .map(v => v == null ? '' : String(v)).join(' ').toLowerCase();
  return hay.includes(q);
}

function render() {
  const filter = $('stage-filter').value;
  const q = searchText.trim().toLowerCase();
  const codeF = $('code-filter').value;
  let shown = leads;
  if (filter) shown = shown.filter(l => (l.stage || '') === filter);
  if (codeF) shown = shown.filter(l => (l.location_code || '') === codeF);
  if (q) shown = shown.filter(l => leadMatches(l, q));
  $('lead-count').textContent = shown.length + (shown.length === 1 ? ' lead' : ' leads');
  if (view !== 'map' && mapObj) { try { mapObj.remove(); } catch (_) {} mapObj = null; }
  if (view === 'table') renderTable(shown);
  else if (view === 'map') renderMap(shown);
  else if (view === 'buildings') renderBuildings();
  else if (view === 'today') renderToday();
  else renderCards(shown);
  updatePrintBtn();
}

function renderCards(shown) {
  const container = $('leads-container');
  const filter = $('stage-filter').value;
  if (!shown.length) {
    container.innerHTML = '<div class="empty">No leads match. Try clearing the search or the stage filter.</div>';
    return;
  }
  const order = filter ? [filter] : STAGES.concat(['(No stage)']);
  let html = '';
  order.forEach(stage => {
    const group = shown.filter(l => (l.stage || '(No stage)') === stage);
    if (!group.length) return;
    html += '<div class="stage-group"><div class="stage-head">' + esc(stage) +
            ' <span class="pill">' + group.length + '</span></div><div class="cards">';
    group.forEach(l => { html += leadCard(l); });
    html += '</div></div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => openDialog(btn.getAttribute('data-edit'))));
  container.querySelectorAll('.card-stage').forEach(sel =>
    sel.addEventListener('change', () => changeStage(sel.getAttribute('data-id'), sel.value)));
}

// Airtable-style spreadsheet grid: sortable columns, inline stage, click a row to edit.
const TABLE_COLS = [
  ['tenant_name', 'Company'], ['contact_name', 'Contact'], ['address', 'Address'],
  ['floor', 'Floor'], ['rsf', 'RSF'], ['phone', 'Phone'], ['email', 'Email'],
  ['lease_expiration', 'Lease exp.'], ['next_followup', 'Follow-up'],
  ['stage', 'Stage'], ['owner', 'Owner'], ['location_code', 'Code'], ['notes', 'Notes'],
];

function renderTable(shown) {
  const container = $('leads-container');
  let data = shown.slice();
  if (sortKey) {
    data.sort((a, b) => {
      if (sortKey === 'rsf') return ((Number(a.rsf) || 0) - (Number(b.rsf) || 0)) * sortDir;
      const x = (a[sortKey] == null ? '' : String(a[sortKey])).toLowerCase();
      const y = (b[sortKey] == null ? '' : String(b[sortKey])).toLowerCase();
      return (x < y ? -1 : x > y ? 1 : 0) * sortDir;
    });
  }
  let html = '<div class="table-wrap"><table class="grid"><thead><tr>';
  html += '<th class="chk-col"><input type="checkbox" id="chk-all" title="Check/uncheck all shown"></th>';
  TABLE_COLS.forEach(([k, label]) => {
    const arrow = sortKey === k ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
    html += '<th data-sort="' + k + '">' + esc(label) + arrow + '</th>';
  });
  html += '</tr></thead><tbody>';
  if (!data.length) {
    html += '<tr><td class="empty" colspan="' + (TABLE_COLS.length + 1) + '">No leads match. Try clearing the search or the stage filter.</td></tr>';
  }
  data.forEach(l => {
    html += '<tr data-edit="' + l.id + '">';
    html += '<td class="chk-col"><input type="checkbox" class="row-chk" data-id="' + l.id + '"' +
            (selected.has(String(l.id)) ? ' checked' : '') + '></td>';
    TABLE_COLS.forEach(([k]) => {
      if (k === 'stage') {
        const opts = STAGES.map(s => '<option' + (s === l.stage ? ' selected' : '') + '>' + esc(s) + '</option>').join('') +
          (STAGES.includes(l.stage) ? '' : '<option selected>' + esc(l.stage || '(No stage)') + '</option>');
        html += '<td class="stage-cell"><select class="card-stage" data-id="' + l.id + '">' + opts + '</select></td>';
      } else if (k === 'rsf') {
        html += '<td class="num">' + (l.rsf ? Number(l.rsf).toLocaleString() : '') + '</td>';
      } else if (k === 'notes') {
        html += '<td class="notes-cell" title="' + esc(l.notes || '') + '">' + esc(l.notes || '') + '</td>';
      } else if (k === 'next_followup') {
        const c = followupColor(l.next_followup);
        html += '<td' + (c ? ' style="color:' + c + ';font-weight:600"' : '') + '>' + esc(fmtDate(l.next_followup)) + '</td>';
      } else if (k === 'lease_expiration') {
        html += '<td>' + esc(fmtDate(l.lease_expiration)) + '</td>';
      } else {
        html += '<td>' + esc(l[k] == null ? '' : l[k]) + '</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;

  container.querySelectorAll('th[data-sort]').forEach(th => th.addEventListener('click', () => {
    const k = th.getAttribute('data-sort');
    if (sortKey === k) sortDir = -sortDir; else { sortKey = k; sortDir = 1; }
    render();
  }));
  container.querySelectorAll('.card-stage').forEach(sel => {
    sel.addEventListener('click', e => e.stopPropagation());
    sel.addEventListener('change', () => changeStage(sel.getAttribute('data-id'), sel.value));
  });
  container.querySelectorAll('tr[data-edit]').forEach(tr => tr.addEventListener('click', (e) => {
    if (e.target.closest('.stage-cell') || e.target.closest('.chk-col')) return;
    openDialog(tr.getAttribute('data-edit'));
  }));

  // Row checkboxes (build the visit list)
  const allBox = $('chk-all');
  const syncAll = () => { if (allBox) allBox.checked = data.length > 0 && data.every(l => selected.has(String(l.id))); };
  container.querySelectorAll('.row-chk').forEach(cb => {
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', () => {
      const id = String(cb.getAttribute('data-id'));
      if (cb.checked) selected.add(id); else selected.delete(id);
      syncAll(); updatePrintBtn();
    });
  });
  if (allBox) {
    syncAll();
    allBox.addEventListener('click', e => e.stopPropagation());
    allBox.addEventListener('change', () => {
      data.forEach(l => { if (allBox.checked) selected.add(String(l.id)); else selected.delete(String(l.id)); });
      updatePrintBtn(); renderTable(shown);
    });
  }
}

function updatePrintBtn() {
  $('print-btn').textContent = '🖨 Print list (' + selected.size + ')';
  $('delete-selected-btn').textContent = '🗑 Delete (' + selected.size + ')';
}

// Delete every checked lead (with confirmation).

// Build a printable, block-grouped visit sheet from the checked leads and open the print dialog.
function doPrint() {
  const chosen = leads.filter(l => selected.has(String(l.id)));
  if (!chosen.length) {

  let curCode = null;
  chosen.forEach(l => {
    const code = l.location_code || '—';
    if (code !== curCode) { curCode = code; html += '<h2>Block ' + esc(code) + '</h2>'; }
    const addr = [l.address, l.floor ? 'Fl ' + l.floor : ''].filter(Boolean).join(' · ');
    html += '<div class="pitem"><div class="pline1"><span class="pbox"></span> <b>' +
      esc(l.tenant_name || '(unnamed tenant)') + '</b> — ' + esc(addr) + '</div>';
    const contact = [l.contact_name, l.phone, l.email].filter(Boolean).map(esc).join(' · ');
    if (contact) html += '<div class="pline">' + contact + '</div>';
    const dates = [];
    if (l.lease_expiration) dates.push('Lease exp: ' + fmtDate(l.lease_expiration));
    if (l.next_followup) dates.push('Follow-up: ' + fmtDate(l.next_followup));
    if (l.last_popin_date) dates.push('Last pop-in: ' + fmtDate(l.last_popin_date) + ' (' + (Number(l.popin_count) || 0) + ')');
    if (dates.length) html += '<div class="pline">' + esc(dates.join('  ·  ')) + '</div>';
    if (l.notes) html += '<div class="pline">Notes: ' + esc(l.notes) + '</div>';
    html += '</div>';
  });

  $('print-area').innerHTML = html;

}
$('print-btn').addEventListener('click', doPrint);

$('view-table').addEventListener('click', () => setView('table'));
$('view-map').addEventListener('click', () => setView('map'));
$('view-buildings').addEventListener('click', () => setView('buildings'));

$('print-day-btn').addEventListener('click', doPrintDay);

// A lead is "due" if its follow-up is overdue or within the next 7 days.
function isDue(l) {
  const d = daysUntil(l.next_followup);
  return d !== null && d <= 7;
}

// Map view: plot the due leads as urgency-colored pins on a free OpenStreetMap map.
function renderMap(shown) {
  const container = $('leads-container');
  if (mapObj) { try { mapObj.remove(); } catch (_) {} mapObj = null; }
  const due = shown.filter(isDue);
  const located = due.filter(l => l.lat != null && l.lng != null);
  const missing = due.length - located.length;
  container.innerHTML =
    '<div class="map-note">Showing <b>' + due.length + '</b> due lead' + (due.length === 1 ? '' : 's') +
    ' (overdue or due within 7 days) — red = overdue, orange = due within the next month.' +
    (missing ? ' <b>' + missing + '</b> not yet mapped (no saved location — open &amp; re-save to locate).' : '') +
    '</div><div id="map"></div>';

  mapObj = L.map('map').setView([40.7529, -73.9910], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap contributors', maxZoom: 19 }).addTo(mapObj);

  const pts = [];
  located.forEach(l => {
    const color = followupColor(l.next_followup) || '#666';
    const m = L.circleMarker([l.lat, l.lng], {
      radius: 9, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.95
    }).addTo(mapObj);
    const addr = [l.address, l.floor ? 'Fl ' + l.floor : ''].filter(Boolean).join(' · ');
    m.bindPopup(
      '<b>' + esc(l.tenant_name || '(unnamed tenant)') + '</b><br>' + esc(addr) + '<br>' +
      (l.phone ? esc(l.phone) + '<br>' : '') +
      'Follow-up: <b style="color:' + color + '">' + esc(fmtDate(l.next_followup)) + '</b><br>' +
      '<a href="#" onclick="openDialog(\'' + l.id + '\');return false;">Open lead →</a>'
    );
    pts.push([l.lat, l.lng]);
  });
  if (pts.length) mapObj.fitBounds(pts, { padding: [40, 40], maxZoom: 16 });
  setTimeout(() => { if (mapObj) mapObj.invalidateSize(); }, 100);
}

// Look up coordinates for an address via the free OpenStreetMap geocoder.
async function geocode(address) {
  try {
    const q = encodeURIComponent(address + ', New York, NY');
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + q);
    const j = await r.json();
    if (j && j[0]) return { lat: parseFloat(j[0].lat), lng: parseFloat(j[0].lon) };
  } catch (_) {}
  return null;
}

/* ================= Buildings ================= */
const BLDG_COLS = [
  ['address', 'Address'], ['location_code', 'Code'], ['floors', 'Floors'],
  ['__leads', 'Leads'], ['canvass_status', 'Status'], ['last_canvassed', 'Last canvassed'],
  ['landlord', 'Landlord'], ['asking_rent', 'Asking rent'], ['access', 'Access'], ['notes', 'Notes'],
];
let bldgSortKey = null, bldgSortDir = 1;

function renderBuildings() {
  const container = $('leads-container');
  const statusF = $('bldg-status-filter').value;
  const counts = {};
  leads.forEach(l => { if (l.building_id != null) counts[l.building_id] = (counts[l.building_id] || 0) + 1; });

  let list = buildings.slice();
  if (statusF) list = list.filter(b => (b.canvass_status || 'To Canvass') === statusF);
  const key = bldgSortKey || 'location_code';
  list.sort((a, b) => {
    if (key === '__leads') return ((counts[a.id] || 0) - (counts[b.id] || 0)) * bldgSortDir;
    if (key === 'floors' || key === 'asking_rent') return ((Number(a[key]) || 0) - (Number(b[key]) || 0)) * bldgSortDir;
    const x = (a[key] == null ? '' : String(a[key])).toLowerCase();
    const y = (b[key] == null ? '' : String(b[key])).toLowerCase();
    return (x < y ? -1 : x > y ? 1 : 0) * bldgSortDir;
  });
  $('bldg-count').textContent = list.length + (list.length === 1 ? ' building' : ' buildings');

  if (!buildings.length) {
    container.innerHTML = '<div class="empty">No buildings yet. Click <b>+ Add building</b> to add one to canvass.</div>';
    updateCanvassBtn(); return;
  }
  if (!list.length) {
    container.innerHTML = '<div class="empty">No buildings match that status.</div>';
    updateCanvassBtn(); return;
  }

  let html = '<div class="table-wrap"><table class="grid"><thead><tr>';
  html += '<th class="chk-col"><input type="checkbox" id="bchk-all" title="Check/uncheck all shown"></th>';
  BLDG_COLS.forEach(([k, label]) => {
    const arrow = bldgSortKey === k ? (bldgSortDir === 1 ? ' ▲' : ' ▼') : '';
    html += '<th data-bsort="' + k + '">' + esc(label) + arrow + '</th>';
  });
  html += '</tr></thead><tbody>';
  list.forEach(b => {
    html += '<tr data-bldg="' + b.id + '">';
    html += '<td class="chk-col"><input type="checkbox" class="bldg-check" data-bldg="' + b.id + '"' +
            (selectedBldgs.has(String(b.id)) ? ' checked' : '') + '></td>';
    BLDG_COLS.forEach(([k]) => {
      if (k === '__leads') html += '<td class="num">' + (counts[b.id] || 0) + '</td>';
      else if (k === 'address') html += '<td><b>' + esc(b.address || '') + '</b></td>';
      else if (k === 'canvass_status') html += '<td>' + esc(b.canvass_status || 'To Canvass') + '</td>';
      else if (k === 'last_canvassed') html += '<td>' + esc(fmtDate(b.last_canvassed)) + '</td>';
      else if (k === 'asking_rent') html += '<td class="num">' + esc(fmtRent(b.asking_rent)) + '</td>';
      else if (k === 'notes' || k === 'access') html += '<td class="notes-cell" title="' + esc(b[k] || '') + '">' + esc(b[k] || '') + '</td>';
      else html += '<td>' + esc(b[k] == null ? '' : b[k]) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;

  container.querySelectorAll('th[data-bsort]').forEach(th => th.addEventListener('click', () => {
    const k = th.getAttribute('data-bsort');
    if (bldgSortKey === k) bldgSortDir = -bldgSortDir; else { bldgSortKey = k; bldgSortDir = 1; }
    renderBuildings();
  }));
  container.querySelectorAll('tr[data-bldg]').forEach(tr => tr.addEventListener('click', (e) => {
    if (e.target.closest('.chk-col')) return;
    openBuilding(tr.getAttribute('data-bldg'));
  }));
  const syncAll = () => { const ab = $('bchk-all'); if (ab) ab.checked = list.length > 0 && list.every(b => selectedBldgs.has(String(b.id))); };
  container.querySelectorAll('.bldg-check').forEach(cb => {
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', () => {
      const id = String(cb.getAttribute('data-bldg'));
      if (cb.checked) selectedBldgs.add(id); else selectedBldgs.delete(id);
      syncAll(); updateCanvassBtn();
    });
  });
  const allBox = $('bchk-all');
  if (allBox) {
    syncAll();
    allBox.addEventListener('change', () => {
      list.forEach(b => { if (allBox.checked) selectedBldgs.add(String(b.id)); else selectedBldgs.delete(String(b.id)); });
      updateCanvassBtn(); renderBuildings();
    });
  }
  updateCanvassBtn();
}

function updateCanvassBtn() {
  const el = $('print-canvass-btn');

}

// Print the checked buildings as a canvass sheet, grouped by block, with each building's tenants/leads.
function doPrintCanvass() {
  const chosen = buildings.filter(b => selectedBldgs.has(String(b.id)));
  if (!chosen.length) {
    alert('In the Buildings view, tick the buildings you want to canvass, then click Print canvass.');

    if (b.notes) html += '<div class="pline">' + esc(b.notes) + '</div>';
    const inb = leads.filter(l => String(l.building_id) === String(b.id))
      .sort((x, y) => String(x.floor || '').localeCompare(String(y.floor || ''), undefined, { numeric: true }));
    inb.forEach(l => {
      const bits = [l.floor ? 'Fl ' + l.floor : '', l.tenant_name || '(unnamed)', l.stage || '', l.phone || '']

// Gather everything that happened on a given day (YYYY-MM-DD).
function computeDay(day) {
  const prefix = datePrefixFor(day) + ',';
  const logged = [];
  leads.forEach(l => {
    if (!l.activity_log) return;
    const lines = l.activity_log.split('\n').filter(ln => ln.startsWith(prefix));
    if (lines.length) logged.push([l, lines]);
  });
  const popins = leads.filter(l => l.last_popin_date === day);
  const created = leads.filter(l => l.created_at && localYMD(l.created_at) === day);
  const due = leads.filter(l => l.next_followup && l.next_followup <= day)
    .sort((a, b) => String(a.next_followup).localeCompare(String(b.next_followup)));
  return { logged, popins, created, due };
}

// Find existing leads at the same address (so we can offer "pop back in").
function normAddr(a) {
  if (!a) return '';
  return String(a).toLowerCase()
    .replace(/\./g, '')
    .replace(/,/g, ' ')
    .replace(/\bwest\b/g, 'w').replace(/\beast\b/g, 'e')
    .replace(/\bnorth\b/g, 'n').replace(/\bsouth\b/g, 's')
    .replace(/\bstreet\b/g, 'st').replace(/\bavenue\b/g, 'ave')
    .replace(/\bboulevard\b/g, 'blvd').replace(/\bplace\b/g, 'pl')
    .replace(/\b(\d+)(st|nd|rd|th)\b/g, '$1')   // 36th -> 36
    .replace(/\s+/g, ' ').trim();
}

function findMatches(fields) {
  const a = normAddr(fields.address);
  if (!a) return [];
  const all = leads.filter(l => normAddr(l.address) === a);
  const t = (fields.tenant_name || '').trim().toLowerCase();
  if (t) {
    const byTenant = all.filter(l => (l.tenant_name || '').trim().toLowerCase() === t);
    if (byTenant.length) return byTenant;   // same tenant at this address wins
  }
  return all;
}

// Log a pop-in on an existing lead: append the note, bump the count, set today's date,
// and fill in any fields that were still blank. Never overwrites existing values.
async function applyPopIn(lead, fields, note) {
  const today = new Date().toISOString().slice(0, 10);
  const payload = {
    popin_count: (Number(lead.popin_count) || 0) + 1,
    last_popin_date: today,
    popin_log: stamp() + ': ' + note + (lead.popin_log ? '\n' + lead.popin_log.trim() : ''),
  };
  const fillable = ['floor', 'tenant_name', 'rsf', 'contact_name', 'lease_expiration',
    'email', 'phone', 'next_followup', 'location_code', 'notes'];
  for (const k of fillable) {
    const cur = lead[k], val = fields[k];
    if ((cur === null || cur === undefined || cur === '') &&
        val !== null && val !== undefined && val !== '') {
      payload[k] = val;
    }
  }
  const msg = $('capture-msg');
  msg.textContent = 'Updating…';
  const { error } = await sb.from('leads').update(payload).eq('id', lead.id);
  if (error) { msg.textContent = 'Could not update: ' + error.message; return; }
  $('capture-text').value = '';
  msg.textContent = 'Updated ' + (lead.tenant_name || 'lead') + ' — pop-in #' + payload.popin_count + ' logged.';
  loadLeads();
}

// Voice dictation using the browser's built-in speech recognition (Chrome).
(function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = $('mic-btn');
  if (!SR) { micBtn.style.display = 'none'; return; }  // e.g. Safari/Firefox: use phone keyboard mic instead
  const rec = new SR();
  rec.continuous = true; rec.interimResults = false; rec.lang = 'en-US';
  let listening = false;
  rec.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    const ta = $('capture-text');
    ta.value = (ta.value ? ta.value.trim() + ' ' : '') + t.trim();
  };
  rec.onend = () => { listening = false; micBtn.textContent = '🎤 Dictate'; micBtn.classList.remove('rec'); };
  rec.onerror = () => { listening = false; micBtn.textContent = '🎤 Dictate'; micBtn.classList.remove('rec'); };
  micBtn.addEventListener('click', () => {
    if (listening) { rec.stop(); return; }
    try { rec.start(); listening = true; micBtn.textContent = '⏹ Stop'; micBtn.classList.add('rec'); }
    catch (_) { /* ignore double-starts */ }
  });
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {};
  for (const el of form.elements) {
    if (!el.name) continue;
    let v = el.value;
    if (v === '' && NULL_IF_EMPTY.includes(el.name)) v = null;
    else if (v === '') v = null;
    else if (NUMERIC.includes(el.name)) v = Number(v);
    payload[el.name] = v;
  }

  // Build any timestamped activity-log entries (a typed update and/or a stage change).
  const additions = [];
  const upd = $('update-text').value.trim();
  if (upd) additions.push(stamp() + ': ' + upd);
  if (editingId && originalStage != null && payload.stage !== originalStage) {
    additions.push(stamp() + ': Stage → ' + payload.stage);
  }
  if (additions.length) {
    const existing = editingId
      ? (leads.find(l => String(l.id) === String(editingId))?.activity_log || '')
      : '';
    payload.activity_log = additions.join('\n') + (existing ? '\n' + existing : '');
  }

  // Log a pop-in (timestamped, newest first) — bumps the count and sets today's date.
  const popNote = $('popin-text').value.trim();
  if (popNote) {
    const cur = editingId ? (leads.find(l => String(l.id) === String(editingId)) || {}) : {};
    const existingLog = cur.popin_log || '';
    payload.popin_log = stamp() + ': ' + popNote + (existingLog ? '\n' + existingLog.trim() : '');
    payload.popin_count = (Number(cur.popin_count) || 0) + 1;
    payload.last_popin_date = new Date().toISOString().slice(0, 10);
  }

  $('save-btn').disabled = true;

  // Look up map coordinates when the address is new or has changed.
  const curLead = editingId ? leads.find(l => String(l.id) === String(editingId)) : null;
  if (payload.address && (!curLead || curLead.address !== payload.address || curLead.lat == null)) {
    $('save-btn').textContent = 'Locating…';
    const g = await geocode(payload.address);
    $('save-btn').textContent = 'Save';
    if (g) { payload.lat = g.lat; payload.lng = g.lng; }
  }

  // Link the lead to a building (match by address; create the building if it's new).
  if (payload.address) {
    try {
      const { data: existing } = await sb.from('buildings').select('id').eq('address', payload.address).limit(1);
      if (existing && existing.length) {
        payload.building_id = existing[0].id;
      } else {
        const { data: nb } = await sb.from('buildings')
          .insert({ address: payload.address, location_code: payload.location_code || null, lat: payload.lat ?? null, lng: payload.lng ?? null })
          .select('id').single();
        if (nb) payload.building_id = nb.id;
      }
    } catch (_) { /* leave building_id unset if it fails */ }
  }

  let error;
  if (editingId) ({ error } = await sb.from('leads').update(payload).eq('id', editingId));
  else ({ error } = await sb.from('leads').insert(payload));
  $('save-btn').disabled = false;
  if (error) { alert('Could not save: ' + error.message); return; }
  dialog.close();
  loadLeads();
});

// Compose an email to this lead's contact in your own mail app, and log it to the Activity Log.
$('email-btn').addEventListener('click', async () => {
  const email = form.elements['email'].value.trim();
  if (!email) { alert('No email on file for this lead — add one first.'); return; }
  if (!editingId) { alert('Save this lead first, then click Email.'); return; }
  const contact = form.elements['contact_name'].value.trim();
  const company = form.elements['tenant_name'].value.trim();
  const subject = company ? 'MBRE Advisors — ' + company : 'MBRE Advisors';
  const body = 'Hi ' + (contact || 'there') + ',\n\n';
  const mailto = 'mailto:' + encodeURIComponent(email) +
    '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  const a = document.createElement('a');
  a.href = mailto; a.click();   // hands off to your default mail app (Outlook, Gmail, etc.)

  // Log it in the Activity Log
  const lead = leads.find(l => String(l.id) === String(editingId)) || {};
  const entry = stamp() + ': Emailed ' + (contact || email) + ' <' + email + '>';
  const activity_log = entry + (lead.activity_log ? '\n' + lead.activity_log : '');
  const { error } = await sb.from('leads').update({ activity_log }).eq('id', editingId);
  if (error) { alert('Email opened, but could not log it: ' + error.message); return; }
  lead.activity_log = activity_log;
  renderLogEl($('activity-view'), activity_log, 'No updates logged yet.');
});

$('delete-btn').addEventListener('click', async () => {
  if (!editingId) return;
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  const { error } = await sb.from('leads').delete().eq('id', editingId);
  if (error) { alert('Could not delete: ' + error.message); return; }
  dialog.close();
  loadLeads();
});

/* ================= Location code =================
   3-digit code: first two digits = the cross-street number,
   third digit = the avenue block (hundreds digit of the building number).
   Example: "230 W 36th St" -> cross street 36, building 230 (hundreds = 2) -> "362".
   Returns null when the address isn't a numbered side street (e.g. an avenue). */
function computeLocationCode(address) {
  if (!address) return null;
  const cross = extractCrossStreet(address);
  const buildMatch = String(address).match(/\d+/);   // first number = building number
  if (cross == null || !buildMatch) return null;
  const building = parseInt(buildMatch[0], 10);
  const blockDigit = Math.floor((building % 1000) / 100);  // hundreds digit, 0-9
  return String(cross).padStart(2, '0') + String(blockDigit);
}

function extractCrossStreet(address) {
  // Prefer an ordinal number followed by St/Street, e.g. "36th St", "42nd Street".
  let m = address.match(/(\d{1,3})\s*(?:st|nd|rd|th)\s+(?:st\b|street\b)/i);
  if (m) return parseInt(m[1], 10);
  // Otherwise a direction + ordinal, e.g. "W 36th", "East 42nd".
  m = address.match(/\b(?:w|e|west|east)\.?\s*(\d{1,3})\s*(?:st|nd|rd|th)\b/i);
  if (m) return parseInt(m[1], 10);
  return null;
}

/* ================= Utils ================= */
// A readable local timestamp, e.g. "Jul 5, 2026, 3:42 PM".
function stamp() {
  return new Date().toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

// Format a stored date (YYYY-MM-DD) for display as MM/DD/YYYY.
function fmtDate(iso) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(iso || '')) return iso || '';
  const [y, m, d] = iso.split('-');
  return m + '/' + d + '/' + y;
}

// Local YYYY-MM-DD (from a Date or an ISO string).
function localYMD(dt) {
  const d = (dt instanceof Date) ? dt : new Date(dt);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function todayYMD() { return localYMD(new Date()); }
// "Jul 12, 2026" for a YYYY-MM-DD (matches the date part of stamp()).
function datePrefixFor(ymd) {
  const [y, m, d] = ymd.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

// Format asking rent as $00.00.
function fmtRent(v) {
  if (v == null || v === '') return '';
  const n = Number(v);
  return isNaN(n) ? '' : '$' + n.toFixed(2);
}

// Whole days from today until a date (negative = overdue).
function daysUntil(iso) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(iso || '')) return null;
  const [y, m, d] = iso.split('-').map(Number);
  const due = new Date(y, m - 1, d);
  const n = new Date();
  const today = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  return Math.round((due - today) / 86400000);
}

// Follow-up color: RED = overdue, ORANGE = due within the next month, GREEN = further out.
function followupColor(iso) {
  const d = daysUntil(iso);
  if (d === null) return '';
  if (d < 0) return '#c0392b';     // overdue
  if (d <= 30) return '#d97706';   // due within the next month
  return '#15803d';                // more than a month away
}

// Render a timestamped log (newest first) into an element.
function renderLogEl(el, log, emptyMsg) {
  if (!log) { el.innerHTML = '<span class="muted-note">' + esc(emptyMsg || 'Nothing logged yet.') + '</span>'; return; }
  el.innerHTML = log.split('\n').filter(Boolean)
    .map(line => '<div class="act-line">' + esc(line) + '</div>').join('');
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
